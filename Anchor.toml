[toolchain]
package_manager = "npm"

[features]
resolution = false
skip-lint = false

[programs.devnet]
custom_price_feed = "BKNrLd3u7VpuGCfLYUvUyrfKNApt9nXEFtfozdsHSUc1"
grai = "APwEPN6PYrRgEqL2G2CnmhQNouikdKiNdPJ48YX5Y8a8"

[programs.localnet]
